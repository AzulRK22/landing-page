<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>CloseCut Library Reader</title>

    <meta name="description" content="Read a canonical CloseCut book online." />

    <meta name="robots" content="noindex,follow" />
    <meta name="theme-color" content="#000000" />

    <link rel="icon" href="../../images/CloseCut/final%20icon%20closecut.webp" type="image/webp" />

    <link rel="stylesheet" href="../../assets/css/base.css" />
    <link rel="stylesheet" href="../closecut.css" />
    <link rel="stylesheet" href="library.css" />
</head>

<body class="closecut-site library-site">
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="marketing-header">
        <div class="marketing-nav-shell">
            <a class="brand" href="./" aria-label="Back to CloseCut Library">
                <img src="../../images/CloseCut/final%20icon%20closecut.webp" alt="" width="36" height="36" />
                <span>CloseCut Library</span>
            </a>

            <nav class="marketing-nav" aria-label="Reader navigation">
                <a href="./">All books</a>
                <a href="../">CloseCut</a>
            </nav>
        </div>
    </header>

    <main id="main" class="marketing-container">
        <section class="library-collection">
            <p class="eyebrow">Reader foundation</p>
            <h1 id="reader-title">Book reader coming next.</h1>

            <p id="reader-message" class="library-message" role="status">
                The selected book has not been loaded.
            </p>

            <p>
                <a class="button button-quiet" href="./">
                    Return to the Library
                </a>
            </p>
        </section>
    </main>

    <script src="reader.js"></script>
</body>

</html>
